<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f766e" />
    <title>試合一覧 | RallyMatch</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>試合一覧</h1>
        <p id="status" class="status">読み込み中…</p>
      </header>
      <main id="matches" class="matches" aria-live="polite"></main>
      <p id="empty" class="empty hidden">試合がありません</p>
      <p id="error" class="error hidden"></p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
